<section class="section section--white">
  <div class="section__inner">
    <h2>Physicality</h2>
    <p>
      Watch the video to understand the key elements of physicality, and how to observe these in everyday contexts.
    </p>
    <div class="videos-row">
      <app-youtube-player
        title="KLPT-physicality"
        description="KLPT Physicality"
        [youtubeUrl]="'https://www.youtube.com/watch?v=1BbO3pI1GVk'"
      >
      </app-youtube-player>
    </div>
  </div>
</section>

<section class="section section--cream">
  <div class="section__inner">
    <p class="eyebrow">Learning domain</p>
    <h1>Physicality</h1>
    <div class="card-grid">
      @for (card of cards; track card.title) {
        <app-domain-card
          [title]="card.title"
          [description]="card.description"
          [url]="card.url"
          [background]="card.background"
          [hoverBorderColor]="card.hoverBorderColor"
          [imageSrc]="card.imageSrc"
          [imageAlt]="card.imageAlt"
        />
      }
    </div>
  </div>
</section>
