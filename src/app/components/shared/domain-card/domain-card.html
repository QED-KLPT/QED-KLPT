@if (hasUrl) {
  <a
    class="domain-card domain-card--interactive"
    [routerLink]="url"
    [style.--domain-card-bg]="background"
    [style.--domain-card-hover-border]="hoverBorderColor"
  >
    @if (imageSrc) {
      <span class="domain-card__icon domain-card__icon--image" aria-hidden="true">
        <img [src]="imageSrc" [alt]="imageAlt" />
      </span>
    } @else {
      <span class="domain-card__icon" aria-hidden="true">{{ initial }}</span>
    }

    <span class="domain-card__content">
      <span class="domain-card__title">{{ title }}</span>
      <span class="domain-card__description">{{ description }}</span>
    </span>
  </a>
} @else {
  <div
    class="domain-card"
    [style.--domain-card-bg]="background"
    [style.--domain-card-hover-border]="hoverBorderColor"
  >
    @if (imageSrc) {
      <span class="domain-card__icon domain-card__icon--image" aria-hidden="true">
        <img [src]="imageSrc" [alt]="imageAlt" />
      </span>
    } @else {
      <span class="domain-card__icon" aria-hidden="true">{{ initial }}</span>
    }

    <span class="domain-card__content">
      <span class="domain-card__title">{{ title }}</span>
      <span class="domain-card__description">{{ description }}</span>
    </span>
  </div>
}
