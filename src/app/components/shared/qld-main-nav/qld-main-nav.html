<nav class="qld__main-nav" [class.qld__main-nav--dark]="theme() === 'dark'" aria-label="main">
  <div class="qld__main-nav__container">

    <div class="qld__main-nav__mobile-bar" *ngIf="showMobileToggle()">
      <button
        type="button"
        class="qld__main-nav__toggle"
        [class.qld__main-nav__toggle--open]="isMenuOpen()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="qld-main-nav-list"
        aria-label="Toggle navigation menu"
        (click)="toggleMenu()"
      >
        <span class="qld__main-nav__toggle-label">Menu</span>
        <span class="qld__main-nav__toggle-icon" aria-hidden="true">
          <span></span>
        </span>
      </button>
    </div>

    <ul
      id="qld-main-nav-list"
      class="qld__main-nav__list"
      [class.qld__main-nav__list--open]="isMenuOpen()"
    >

      <li class="qld__main-nav__item">
        <a
          href="#"
          class="qld__main-nav__link qld__main-nav__link--home"
          aria-label="Home"
        >
          <i [class]="getHomeIcon()" class="qld__main-nav__home-icon" aria-hidden="true"></i>
        </a>
      </li>

      <ng-container *ngFor="let item of items()">
        <li
          class="qld__main-nav__item"
          [class.qld__main-nav__item--has-menu]="hasChildren(item)"
          [class.qld__main-nav__item--active]="isItemActive(item) || isChildActive(item)"
        >

          <ng-container *ngIf="hasChildren(item)">
            <div class="qld__main-nav__item-row">
              <a
                [href]="item.href"
                class="qld__main-nav__link"
                [class.qld__main-nav__link--active]="isItemActive(item)"
                (click)="closeMenu($event)"
              >
                <i *ngIf="item.icon" [class]="item.icon" class="qld__main-nav__link-icon" aria-hidden="true"></i>
                {{ item.label }}
              </a>
              <button
                type="button"
                class="qld__main-nav__submenu-toggle"
                [class.qld__main-nav__submenu-toggle--open]="openSubmenu() === item.label"
                [attr.aria-expanded]="openSubmenu() === item.label"
                [attr.aria-controls]="item.label + '-submenu'"
                aria-label="Toggle {{ item.label }} submenu"
                (click)="toggleSubmenu(item.label)"
              >
                <span aria-hidden="true"></span>
              </button>
            </div>

            <ul
              [id]="item.label + '-submenu'"
              class="qld__main-nav__submenu"
              [class.qld__main-nav__submenu--mega]="item.children && item.children.length > 5"
              [class.qld__main-nav__submenu--open]="openSubmenu() === item.label"
              [attr.aria-label]="item.label"
            >
              <li class="qld__main-nav__submenu-heading">
                <a [href]="item.href" class="qld__main-nav__submenu-heading-link">
                  {{ item.label }}
                  <i class="fa-light fa-arrow-right qld__main-nav__submenu-heading-icon" aria-hidden="true"></i>
                </a>
              </li>

              <ng-container *ngIf="item.children">
                <li class="qld__main-nav__submenu-columns">
                  <ng-container *ngFor="let column of getSubmenuColumns(item.children)">
                    <ul class="qld__main-nav__submenu-column">
                      <ng-container *ngFor="let child of column">
                        <li>
                          <a [href]="child.href" (click)="closeMenu($event)">
                            {{ child.label }}
                          </a>
                          <p *ngIf="child.description" class="qld__main-nav__submenu-desc">
                            {{ child.description }}
                          </p>
                        </li>
                      </ng-container>
                    </ul>
                  </ng-container>
                </li>
              </ng-container>

              <li class="qld__main-nav__submenu-footer" *ngIf="item.children && item.children.length > 9">
                <a [href]="item.href" class="qld__main-nav__view-all" (click)="closeMenu($event)">
                  View all
                </a>
              </li>
            </ul>
          </ng-container>

          <ng-container *ngIf="!hasChildren(item)">
            <a
              [href]="item.href"
              class="qld__main-nav__link"
              [class.qld__main-nav__link--active]="isItemActive(item)"
              (click)="closeMenu($event)"
            >
              <i *ngIf="item.icon" [class]="item.icon" class="qld__main-nav__link-icon" aria-hidden="true"></i>
              {{ item.label }}
            </a>
          </ng-container>

        </li>
      </ng-container>

    </ul>

    <div
      class="qld__main-nav__overlay"
      [class.qld__main-nav__overlay--visible]="isMenuOpen()"
      (click)="closeAllMenus()"
      aria-hidden="true"
    ></div>

  </div>
</nav>
