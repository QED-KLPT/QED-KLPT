<div class="youtube-player">
  <div *ngIf="sanitizedUrl" class="video-container">
    <iframe 
      [src]="sanitizedUrl"
      width="560" 
      height="315" 
      [attr.title]="title || 'YouTube video player'"
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

  <div *ngIf="title || description" class="content">
    <h3 *ngIf="title" class="video-title">{{ title }}</h3>
    <p *ngIf="description" class="video-description">{{ description }}</p>
  </div>

  <div *ngIf="!sanitizedUrl" class="no-video">
    <p>No valid YouTube URL provided</p>
  </div>

  <app-transcript [transcript]="transcript"></app-transcript>

</div>
