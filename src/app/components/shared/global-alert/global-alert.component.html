<div role="region" [attr.aria-label]="iconAriaLabel" [class]="alertClasses">
  <div class="container-fluid">
    <div class="qld__global-alert__main">
      <div class="qld__global-alert__icon" aria-hidden="true">
        <i [class]="iconClass"></i>
      </div>
      <div class="qld__global-alert__content">
        <div class="qld__global-alert__message">
          @if (message) {
            <span>{{ message }}</span>
          }
          <ng-content></ng-content>
        </div>
        @if (hasAction) {
          <div class="qld__global-alert__action">
            <a [href]="actionHref">
              <span>{{ actionLabel }}</span>
              <i class="fas fa-arrow-right" aria-hidden="true"></i>
            </a>
          </div>
        }
      </div>
      @if (dismissible) {
        <div class="qld__global-alert__close">
          <button type="button" aria-label="Close alert" (click)="onCloseClick()">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
      }
    </div>
  </div>
</div>
