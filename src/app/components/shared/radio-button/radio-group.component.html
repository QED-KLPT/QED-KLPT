<fieldset class="qld__fieldset">
  <legend [id]="legendId" class="qld__fieldset__legend">
    {{ label }}
    @if (optional) {
      <span class="qld__label--optional">(Optional)</span>
    }
  </legend>

  @if (hint) {
    <span class="qld__hint-text" [id]="hintId">{{ hint }}</span>
  }

  @if (error) {
    <span class="qld__input--error" [id]="errorId">
      <svg
        class="qld__icon qld__icon--lead qld__icon--sm"
        role="img"
        aria-label="Error: "
      >
        <use href="./?a=169317:dist/mysource_files/img/QLD-icons.svg#status-error"></use>
      </svg>
      {{ error }}
    </span>
  }

  <div class="qld__radio-group">
    @for (option of options; track option.value) {
      <div class="qld__control-input qld__control-input--block">
        <input
          type="radio"
          [id]="id + '-' + option.value"
          name="{{ name || id }}"
          class="qld__control-input__input qld__control-input-radio"
          [value]="option.value"
          [disabled]="disabled"
          [attr.aria-describedby]="ariaDescribedBy"
          [attr.aria-required]="required ? 'true' : null"
          [attr.aria-invalid]="isInvalid ? 'true' : null"
        />
        <label [attr.for]="id + '-' + option.value" class="qld__control-input__text">
          {{ option.label }}
        </label>
      </div>
    }
  </div>
</fieldset>
