<section [class]="panelClasses">
  <div class="container-fluid">
    <div class="qld__promo-panel__container row">
      @if (hasImage) {
        <div class="qld__promo-panel__container-image col-xs-12">
          <div class="qld__promo-panel__image" [style.background-image]="imageStyle"></div>
        </div>
      }
      <div class="qld__promo-panel__container-content col-xs-12">
        <div class="qld__promo-panel__container-inner">
          @if (hasIcon) {
            <div class="qld__promo-panel__container-icon">
              <i [class]="iconClass" class="qld__promo-panel__icon" aria-hidden="true"></i>
            </div>
          }
          @if (hasTitle) {
            <h2>{{ title }}</h2>
          }
          @if (hasDescription) {
            <p>{{ description }}</p>
          }
          @if (hasCta) {
            <div class="qld__promo-panel__container-btn">
              <a [href]="ctaHref" class="qld__btn qld__btn--primary">{{ ctaLabel }}</a>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
