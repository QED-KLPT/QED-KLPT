<div class="app-shell">
  <nav class="skip-links" aria-label="Skip links">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <a class="skip-link" href="#primary-navigation">Skip to primary nav</a>
    <a class="skip-link" href="#footer">Skip to footer</a>
  </nav>

  <aside class="beta-ribbon" aria-label="Beta site notice">
    <span>BETA</span>
  </aside>

  <app-header />

  <div class="sr-only" aria-live="polite" aria-atomic="true">{{ pageAnnouncement }}</div>

  <main class="app-main" id="main-content" tabindex="-1">
    <router-outlet />
  </main>

  <app-footer />
</div>

<app-back-to-top />

@if (showUpdateNotice) {
  <aside class="update-snackbar" aria-live="polite" aria-atomic="true">
    <div class="update-snackbar__content">
      <p>A site update is available. Refresh to load the latest version.</p>
      <div class="update-snackbar__actions">
        <button type="button" class="update-snackbar__button update-snackbar__button--secondary" (click)="dismissUpdateNotice()">
          Later
        </button>
        <button type="button" class="update-snackbar__button update-snackbar__button--primary" (click)="refreshForUpdate()">
          {{ isRefreshing ? 'Refreshing...' : 'Refresh' }}
        </button>
      </div>
    </div>
  </aside>
}

@if (showUpdateFailureNotice) {
  <aside class="update-snackbar update-snackbar--warning" aria-live="polite" aria-atomic="true">
    <div class="update-snackbar__content">
      <p>{{ updateFailureMessage }}</p>
      <div class="update-snackbar__actions">
        <button type="button" class="update-snackbar__button update-snackbar__button--secondary" (click)="dismissUpdateFailureNotice()">
          Dismiss
        </button>
      </div>
    </div>
  </aside>
}
